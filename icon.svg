<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  
  <!-- Image frame 1 (back) -->
  <rect x="100" y="120" width="200" height="160" rx="16" fill="url(#shadow)" opacity="0.6"/>
  
  <!-- Image frame 2 (front) -->
  <rect x="160" y="180" width="200" height="160" rx="16" fill="#fff"/>
  <rect x="175" y="195" width="170" height="130" rx="8" fill="url(#shadow)"/>
  
  <!-- Mountain/landscape icon inside -->
  <path d="M185 305 L230 260 L260 285 L310 230 L335 305 Z" fill="#4ade80"/>
  <circle cx="320" cy="220" r="18" fill="#fbbf24"/>
  
  <!-- Conversion arrows -->
  <g fill="#fff">
    <!-- Arrow right -->
    <path d="M340 380 L400 380 L400 360 L440 390 L400 420 L400 400 L340 400 Z"/>
    <!-- Arrow left -->
    <path d="M172 380 L112 380 L112 360 L72 390 L112 420 L112 400 L172 400 Z"/>
  </g>
  
  <!-- Sparkle effects -->
  <circle cx="420" cy="120" r="12" fill="#fff" opacity="0.8"/>
  <circle cx="100" cy="400" r="8" fill="#fff" opacity="0.6"/>
  <circle cx="380" cy="460" r="10" fill="#fff" opacity="0.7"/>
</svg>
